services:
  gateway:
    image: ghcr.io/bigfug/hermes-agent-with-tools:latest
    container_name: hermes
    restart: unless-stopped
    network_mode: host

    volumes:
      - /volume1/docker/hermes:/opt/data

    environment:
      - HERMES_UID=${PUID}
      - HERMES_GID=${PGID}

      # API server
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY}
      - API_SERVER_CORS_ORIGINS=*

      # Messaging / gateway polling
      - HERMES_TELEGRAM_POLL_TIMEOUT=1
      - HERMES_TELEGRAM_POLL_INTERVAL=1

      # Search providers
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}

      # ddgs / exa-py are baked into the image
      - HERMES_DISABLE_LAZY_INSTALLS=1

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    command: ["gateway", "run"]


  dashboard:
    image: ghcr.io/bigfug/hermes-agent-custom:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host

    depends_on:
      - gateway

    volumes:
      - /volume1/docker/hermes:/opt/data

    environment:
      - HERMES_UID=${PUID}
      - HERMES_GID=${PGID}

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    command: ["dashboard", "--host", "127.0.0.1", "--no-open"]
